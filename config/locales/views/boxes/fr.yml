      intro: "En un coup d'œil, consultez <b>le nom des joueurs</b>, leur <b>classement</b>, le nombre de <b>matchs joués</b> et leurs <b>points cumulés</b><br />"
    index_expanded:
      all_boxes_btn: 🔁 vue compacte
      message_box_pop: >
        Si la page ne s'affiche pas correctement, <i class='color-green'>cocher la case pour supprimer le dégradé de couleurs</i>.<br>
        Vous pouvez sauvegarder votre choix dans la page <b>Profil & préférences</b>.
