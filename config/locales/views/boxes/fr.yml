      message_box_pop: "Nom, rang, matchs joués, points obtenus<br /><br /><i class='color-green'>Cliquer pour voir les matchs de la box %{box} en détail</i>"
      message_csv_pop: <b>exporter les joueurs et le referee du round</b> vers un fichier CSV, avec les colonnes suivantes:<br /><i>id, club_id, email, first_name, last_name, nickname, phone_number, role, box_number</i>
      my_current_box: (ma box en cours)
      my_box: (ma box)
      open_view_btn: 🔁 vue complète
      create_round_btn: ⎷ créer le prochain round
      request_round_btn: faire créer le prochain round
      valid_round_flash: "League table annuel: choisir un round valide"
      load_scores: 📄 charger les scores
    my_scores:
      my_scores: Scores & messagerie
      intro_html: >
        La page <b class='color-tennis-red'>Mes scores</b> donne aux joueurs accès à une vue de leur propre Box, d'où ils accèdent à leurs cartes de match, et peuvent entrer de nouveaux scores,<br />
        ce qu'ils peuvent faire également dans les <b class='bold-font color-tennis-blue'>Vue en liste</b> et <b class='bold-font color-tennis-blue'>Vue en table</b>.<br><br>
        <b class='color-tennis-red'>Mes scores</b> donne aussi accès à la <b>Messagerie de la box</b> pour organiser les matchs entre joueurs, ou contacter le Referee.<br>
      intro_stale: Pour le round choisi, accédez à <b>votre box</b><br />pour voir les détails de vos match, et saisir de nouveaux scores
      my_current_box: ma box en cours
      my_box: ma box
      not_in_round: " vous n'êtes pas dans ce round!"
      view_enter_scores: Consulter ou entrer mes scores
      player_header: Joueur
      total_points_header: Cumul points
      played_on_header: Match joué le
      view_box_results_btn: Vers ma box
      see_match_card_btn: Carte du match
      enter_score_btn: Entrer le score
      match_not_played: Match non joué
      chat_in_my_box: Contacter les membres de la box, ou le Referee du Tournoi
      access_chatroom_btn: messagerie de la box
    show_list:
      intro_html: >
        La page des <span class='bold-font color-tennis-blue'>Vue en liste</span> affiche la liste des matchs d'une box, et donne aux joueurs accès à la carte de score des matchs.<br>
        On accède à cette page depuis les <span class='bold-font color-tennis-blue'>Vue en grille</span> en venant de la page <a class='btn btn-inlayed bold-font color-green' href="%{boxes_path}">Les box</a>.<br>
    list_headers:
      match_earnings: Points du match
      match_score_header: Scores
      player_points_header: Points joueur
      opponent_points_header: Points adversaire
      opponent_total_points_header: Cumul adversaire
      points_pop: >
        - Le vainqueur gagne 20 points pour le match.<br />
        - Le perdant gagne 10 points par set gagné + nombre de jeux par set perdu.<br />
        - Le championship tie-break compte comme un set (pas de points attribué au perdant).<br /><br />
        <i>Exemples :</i><br />
        4-2 4-3 : gagnant 20, perdant 5<br />
        4-1 2-4 10-6 : gagnant 20, perdant 11<br />
        4-3 3-4 12-10 : gagnant 20, perdant 13<br />
        4-2 2-4 10-1 : gagnant 20, perdant 12
    list_data:
      won: Gagné
      lost: Perdu
      on_date: "le"
      dont_forget_html: >
        <i>Les joueurs doivent entrer leurs scores dans <b>LeagueBox</b></i>.
    no_match_line:
      not_played: Pas encore joué
      enter_score: Entrer le score
      pop02_a: <i class='color-green'>Cliquer pour entrer le score du match</i>
    match_line:
      pop01: "<b>Score entré</b><br />par %{user}<br />%{date}"
      pop02: <br /><i class='color-green'>Cliquer pour modifier ou supprimer ce score</i>
      won: Gagné
      lost: Perdu
      on_date: "le"
    no_match_cell:
      not_played: Pas encore joué
      enter_score: Entrer le score
    grid_view:
      message_box_pop: <i class='color-green'>voir la box en liste</i>
    show:
      intro_html: >
        La page des <span class='bold-font color-tennis-blue'>Vue en grille</span> affiche la liste des matchs d'une box, et donne aux joueurs accès à la carte de score des matchs.<br>
        Lorsqu'ils sont dans leur box, les joueurs peunvent y entrer les corres de leurs nouveaux matchs.<br>
        On accède à cette page depuis <a class='btn btn-inlayed bold-font color-green' href="%{boxes_path}">Les box</a>,
        et un bouton donne accès aux <span class='bold-font color-tennis-blue'>Vue en liste</span>.<br>
