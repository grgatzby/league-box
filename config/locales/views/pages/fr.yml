fr:
  pages:
    common:
      ok_boxes: 📦 Les box
      ok_view_boxes: 📦 Consulter les box
    home:
      main_title: LeagueBox
      welcome_title: Le tournoi interne de votre club
      p01_html: >
        <ul>
          <li class="home-feature-item"> Un <b class='color-tennis-aqua'>tournoi en simple</b> organisé comme une Box League,
          <li class="home-feature-item"> Seuls <b class='color-tennis-aqua'>les membres du club</b> peuvent participer,
          <li class="home-feature-item"> Les joueurs inscrits sont répartis dans des <b class='color-tennis-aqua'>box de même niveau</b> de 4 à 5 joueurs,
          <li class="home-feature-item"> La saison se déroule en <b class='color-tennis-aqua'>rounds successifs</b> d'un mois ou plus,
          <li class="home-feature-item"> À chaque round les <b class='color-tennis-aqua'>points gagnés se cumulent</b> pour départager le vainqueur de la saison.
        </ul>
      p02_html: 🥇🥈🥉 Le <b>classement du round</b> et la <b>League table</b> (classement de la saison) sont automatiquement mis à jour et affichés sur le tableau d'honneur à la fin des rounds.
      p03_html: >
        Le vainqueur recevra le trophée de la saison 🏆, son nom sur le tableau d'honneur et pourquoi pas
        du champagne pour célébrer sa victoire à la fin de la saison.
      use_title: Le site LeagueBox en pratique
      li06_html: >
        Dans %{inset}, <b>consultez les box du round</b> en un coup d'œil.<br/>
        Cliquez sur une des box pour en détailler les matchs et accédez à la vue en liste ou en grille.<br/>
        Vous avez accès aux rounds et aux saisons précédents.
      li06_boxes: 📦 Les box
      li07_html: >
        Après chaque match, <b>entrez votre score</b> dans %{inset_a}, %{inset_b}, ou %{inset_c}.
      li07_list_view: Vue en liste
      li07_grid_view: Vue en grille
      li07_my_scores: Scores & messagerie
      li08_html: <b>Votre classement est à jour</b> dans %{inset_a} et %{inset_b}.
      li08_round_ranking: 🏆 Classement du round
      li08_league_table: 🏆🏆 League table
      ready_title: Vous êtes prêt? Alors rendez-vous sur les courts! 🎾
      p04: Chaque round dure un mois environ, et vous affronterez les joueurs de votre box.
      li09_html: Pendant la durée d'un round, <b> jouez tous vos matchs</b> dans votre box.
      li10_html: Après chaque match, <b>entrez le score</b> sur LeagueBox.
      li11_html: <b>Consultez votre nouveau classement</b> sur Classement du round et League table.
      li12_html: >
        <b>Promotion, déclassement</b> à la fin du round : dans chaque box
        <br>- le meilleur joueur est promu de 2 box, le second d'une box,
        <br>- le dernier joueur baisse de 2 box, l'avant-dernier d'une box.
      li13: 📜 Règles du tournoi
      p05_html: Consultez les %{inset}
      club_join_title: "Manager de Club: adoptez LeagueBox pour votre club!"
      li14: Nous contacter
      p06_html: >
        Offrez à vos adhérents l'opportunité de jouer un tennis compétitif au sein du club en vous affiliant à LeagueBox.<br>
        LeagueBox s'occupe de tout pour vous!<br>
        Écrivez-nous via le formulaire %{inset} pour en savoir plus.
      happy_tournament: Bon tournoi sur LeagueBox!
      create_club_btn: Créer un nouveau club
      login_link: se connecter
    rules:
      rules_title: Format et règles
      general_rules_section: Règles générales de LeagueBox
      round_dates_section: Saisons & Dates des Rounds
      match_rules_section: Règles des matchs
      scoring_and_points_section: Points & scores
      ranking_and_promotions_section: Classement & promotions
      special_circumstances_section: Cas particuliers
      disputes_section: Différends
      btn_display_gallery: Galerie photos
      btn_hide_gallery: Cacher la galerie photos
      photo_gallery: Galerie photos
      upload_image: Téléverser une image
      edit_gallery: Éditer la galerie
      no_images: Aucune image dans la galerie pour le moment.
      filter_by_caption: Filtrer par légende...
      no_results: Aucune image ne correspond à votre recherche.
    1_general_rules:
      overview: Description du Tournoi
      club: club
      p01_html: >
        Les Box Leagues sont conçues pour permettre aux joueurs de tennis du %{clubname} de <i class='color-tennis-aqua'>se mesurer régulièrement à d'autres joueurs de leur club</i>.
        <br>C'est le moyen idéal pour rencontrer les autres membres du club et d'élargir votre réseau de tennis d'agrément.
      p02_html: >
        La clé du succès est que les joueurs <i class='color-tennis-aqua'>s'engagent à jouer leurs matchs de box</i>. Les membres qui s'inscrivent
        devront s'efforcer de programmer et jouer les matchs prévus. Si, pour quelque raison, vous ne pouvez pas jouer vos matchs,
        prévenez rapidement vos adversaires et votre Arbitre (Referee).
      p03_html: >
        Les joueurs devront <i class='color-tennis-aqua'>notifier à leurs adversaires leurs périodes d'indisponibilité</i>, ainsi que leurs disponibilités.
        Cette discipline facilitera la bonne organisation des matchs.
      rounds: Rounds
      p04: Il y aura un round par mois, sauf contre indication de votre club. Les dates de chaque round du championnat seront annoncées vers la fin du round en cours.
      availability: Disponibilité
      p05: Les joueurs doivent pouvoir disputer leurs matchs le soir et / ou le week-end.
      qualifying_players: Joueurs concernés
      p06: Les joueurs devront avoir 16 ans ou plus au départ du round pour participer au tournoi; toute dérogation est à la discrétion du Referee.
      p07_html: "Les joueurs devront être membres de plein droit du %{clubname}."
      p08: Les membres journaliers pourront exceptionnellement jouer leurs matchs après les heures autorisées en payant les frais d'invité avant de commencer à jouer.
      box_design: Constitution des Box
      p09: Les Box pourront accueillir de 4 à 6 joueurs
      organizing_matches: Organisation des matchs
      p10: Il est de la responsabilité des deux joueurs d'organiser leur match.
    3_match_rules:
      tennis_rules: Règles Générales du Tennis
      p11: Les matchs seront joués selon les règles de l'ITF Tennis qui peuvent être consultées sur www.itftennis.com
      matches_not_umpired: Matchs non arbitrés
      p12: "Les principes suivants s'appliqueront pour les matchs joués sans arbitre:"
      li01: Chaque joueur est responsable d'arbitrer les lignes de son côté du filet.
      li02: Les arbitrages “out” et “faute” doivent être faits juste après le rebond et suffisamment fort pour être entendus par l'adversaire.
      li03: En cas de doute, le joueur donnera le bénéfice du doute à son adversaire.
      li04: >
        Si un joueur déclare par erreur une balle "out" puis se rend compte qu'elle était bonne, le point devrait être rejoué
        sauf s'il s'agissait d'un coup gagnant ou si ce joueur avait déjà déclaré une balle "out" par erreur plus tôt dans le match.
        Dans un tel cas le joueur qui aura déclaré la balle "out" perdra le point.
      li05: Le serveur devra annoncer le score avant chaque premier service, assez fort pour être entendu par l'adversaire.
      warm_up: Échauffement
      p13: Pour garantir que les matchs soient terminés dans l'heure impartie, l'échauffement sera limité à 5 minutes.
      match_format: Format du match
      p14: Les matchs seront joués en deux mini-sets avec un tie-break décisif si nécessaire.
      p15: "Chaque set sera joué en 4 jeux gagnants avec un jeu décisif (ou tie-break) de 7 points à 3:3."
      p16: Le tie-break décisif sera joué comme le premier à %{points} points avec 2 points d'écart minimum.
      p17_html: >
        OPTIONNEL: <i>à décider entre les joueurs avant le début du match</i>
      p18: "Pour que les jeux ne s'éternisent pas, une Mort Subite à égalité peut être jouée pour décider du jeu à 40:40."
      p19: Le receveur décidera alors de quel côté il recevra le service dans une Mort Subite à égalité.
    4_scoring_and_points:
      points: Points
      p20: "Les points gagnés sont calculés de façon à encourager les joueurs à gagner autant de jeux que possible et sont déterminés ainsi:"
      li06: "Gagnant du match: 20 points"
      li07: "Perdant: 10 points par sets gagnés + nombre de jeux par sets perdus"
      li08: Le tie-break compte pour un set (pas de points attribués au perdant)
      p21: "Exemples:"
      li09: "4-2 4-3 : gagnant 20 pts, perdant 5 pts"
      li10: "4-1 2-4 10-6 : gagnant 20 pts, perdant 11 pts"
      li11: "4-3 3-4 12-10 : gagnant 20 pts, perdant 13 pts"
      li12: "4-2 2-4 10-1 : gagnant 20 pts, perdant 12 pts"
      posting_results: Enregistrer les résultats
      p22: L'un ou l'autre des joueurs peut saisir le résultat du match sur le site.
      p23: >
        Chaque joueur de la Box pourra se connecter à son compte et saisir les scores en ligne, ou ils pourront être marqués au tableau
        où une feuille de scores sera mise à votre disposition. Si un résultat a été incorrectement saisi, contacter l'Arbitre (Referee) du Tournoi.
      p24: Veuillez noter que tous les résultats devront être entrés avant la fin du round, à moins qu'un délai ait été accordé par l'Arbitre (Referee).
    5_ranking_and_promotions:
      box_league_ranking: Classement de la Box League
      p25: >
        Le classement d'un joueur est déterminé par le cumul des points gagnés pendant le Round. En cas d'égalité
        de points, le classement sera déterminé selon:
      li13: Le plus de matchs joués
      li14: Le ratio de sets gagnés sur sets joués en %
      li15: Le ratio de jeux gagnés sur jeux joués en %
      promotion_relegation: Promotion / Relégation
      p26: Dans les circonstances habituelles, au prochain round dans chaque box
      li16_html: "les deux meilleurs joueurs seront promus (<i>premier joueur: 2 box, second: 1 box</i>)."
      li17_html: "les deux derniers joueurs seront relégués (<i>avant-dernier joueur: 1 box, dernier: 2 box</i>)."
      new_entrants: Nouveaux entrants
      p27: L'Arbitre (Referee) essaiera autant que possible d'inclure les nouveaux joueurs dans une box adaptée à leur niveau.
    6_special_circumstances:
      disqualification: Disqualification
      p28: >
        Les joueurs qui n'auront pas joué de match dans leur round sans raison valable ou avoir prévenu peuvent être disqualifiés du tournoi,
        à la seule discrétion de l'Arbitre (Referee) du Tournoi.
      no_show: No show
      p29: Si un joueur a plus de
      li18: 5 minutes de retard sur le court son adversaire peut exiger un jeu.
      li19: 10 minutes de retard sur le court son adversaire peut exiger deux jeux.
      li20: 15 minutes de retard sur le court son adversaire peut exiger un set.
      retire_from_match: Forfait d'un match
      p30: Si un joueur déclare forfait, pour blessure par exemple, tous les jeux joués compteront. Les jeux non joués seront déclarés perdus.
      p31: "Par exemple:"
      p32: "Le joueur A mène 2/1, 30:15 au premier set et doit déclarer forfait."
      p33: Le score du match à saisir sera 2/4 0/4 à l'avantage du joueur B.
      withdrawing: Retrait avant le début d'un round
      p34: Les joueurs informeront l'Arbitre (Referee) s'ils souhaitent se retirer de la box league.
      p35: >
        Si le joueur se retire avant le début du round, le Referee s'efforcera pour maintenir sa position dans la league
        s'il souhaitait participer au round suivant.
      walk_overs: Victoire par forfait ou absence (walk-over)
      p36: "Les walk-overs ont été abolis et ne sont plus autorisés pour les raisons suivantes:"
      li21: compliqués à gérer
      li22: il est impossible pour l'Arbitre (Referee) de vérifier les déclarations de walk-overs
      li23: attribution injuste de points non joués
      deadline_extensions: Dérogation de Deadline
      p37: Les joueurs devront s'efforcer de jouer leurs matchs dans le délai imparti pour le round.
      p38: >
        Les joueurs pourront demander un délai à condition que le match ait été arrangé et le court réservé. Une telle requête
        sera jugée à la discrétion de l'Arbitre (Referee) du Tournoi dont la décision sera définitive.
      p39: Les joueurs n'ayant pas joué leurs matchs pendant un round seront retirés et devront se réinscrire pour rester dans le Tournoi.
    7_disputes:
      disputes: Différends
      mail_to_referee_html: "%{referee_name} par e-mail (<i>%{referee_email}</i>) ou via la Messagerie de votre box"
      mail_to_admin_html: "votre admin (e-mail: <i>%{admin_email}</i>)"
      p40_html: "Les décisions de l'Arbitre (Referee) du Tournoi sont définitives. Toute demande de différend est à adresser à %{mailto}."
    sitemap:
      sitemap_title: Plan du site
      home: Page d'accueil
      p01: Présentation générale du Tournoi de la Box League.
      p02_html: Pour l'admin, bouton <i class='color-tennis-aqua'>Ajouter un nouveau club</i>.
      overview_rules: Le Tournoi
      p03: Description du Tournoi et explication des règles de la Box League.
      my_club: Mon Club
      p05_html: >
        Coordonnées de l'admin et de l'Arbitre (Referee) du club.<br>
        Annuaire des joueurs.
      all_boxes: Les box
      p07: "Vue de toutes les box du round avec pour chaque joueur:"
      li01: son nom
      li02: son classement dans le Tournoi
      li03: le nombre de matchs joués
      li04: le cumul de ses points
      p08_html: Le <span class='color-tennis-red'>joueur connecté</span> et le <span class='color-tennis-red'>nom de sa box</span> apparaîssent en rouge.
      p09_html: Un clic sur une box présente la Vue en grille de la box. <br>Le bouton <i>Vue déployée</i> permet de voir toutes les box en vue Grille.<br>
      p10a_html: Quand approche la date de fin du round, un bouton apparaît en bas de la page pour <i class='color-tennis-aqua'>Créer le prochain round</i> (admin),
      p10b_html: ou pour <i class='color-tennis-aqua'>Demander la création du prochain round</i> (referee).
      p11_html: Quand approche la fin du round, un bouton apparaît en bas de la page pour <i class='color-tennis-aqua'>Demander la création du prochain round</i>.
      league_table: Classement d'un round et league table de la saison
      p12_html: Chaque joueur apparaît du mieux au moins bien classé sous les entêtes <b>Joueur, Classement, Points, Box, Matchs </b>(matchs joués)<b>, Gagnés </b>(matchs gagnés)<b>, Sets </b>(sets joués)<b>, Gagnés </b>(sets gagnés).
      p13_html: Modifiez l'ordre de la liste en cliquant sur l'entête correspondant.<br>
      referee_list_view: Vue en Liste (admin/Referee)
      p14_html: >
        Les matchs joués par chaque joueur sont affichés sous forme de liste dont les entêtes sont <b>Score matchs</b>, <b>Points joueur</b>, <b>Points adversaire</b>, <b>Cumul adversaire</b>.<br>
        Les matchs non encore joués sont également listés.<br><br>
        En cliquant sur la ligne d'un match, vous accédez à la page <i>Modifier/Supprimer</i> un score, et l'admin peut cliquer sur une ligne de match non joué pour entrer un <b>Nouveau score</b>.
      table_view: Vue en Grille
      p16: Les matchs de chaque joueur sont affichés sous la colonne de l'adversaire correspondant.
      p17_html: >
        Si vous regardez votre box, votre nom sera affiché en rouge, et un bouton <span class='color-tennis-red'>Mes scores</span> apparaît
        à gauche du lien de bascule vers la <span class='color-tennis-blue'>Vue en liste</span> ( <i class='fa-solid fa-list color-tennis-blue'></i> ).
        Cliquez sur un score pour visionner la carte du match, ou entrez un nouveau score dans votre box.
      p18_html: >
        Un lien de bascule vers la <span class='color-tennis-blue'>Vue en liste</span> ( <i class='fa-solid fa-list color-tennis-blue'></i> ) est affiché.
        Cliquez sur la case d'un match pour <i>Modifier/Supprimer</i> un score, et sur une <i>case "Entrer score"</i> pour entrer un <b>Nouveau score</b>.
      list_view: Vue en Liste (joueur)
      p19_html: Les matchs joués par chaque joueur sont affichés sous forme d'éléments de liste. Les en-têtes sont <b>Score matchs, Points joueur, Points adversaire, Cumul adversaire</b>.
      p20_html: >
        Si vous regardez votre box, votre nom sera affiché en rouge<br>.
        Les <span class='color-green'>matchs gagnés</span> apparaissent en vert, les <span class='color-tennis-red'>matchs perdus</span> en rouge.
        Cliquez sur un score pour afficher la carte du match, ou entrez un nouveau score dans votre box.<br>
        Un bouton <span class='color-tennis-red'>Mes scores</span> apparaît à gauche du lien de bascule vers
        la <span class='color-tennis-blue'>Vue en grille</span> ( <i class='fa-regular fa-table-list color-tennis-blue'></i> ).
      p21_html: >
        Un lien de bascule vers la <span class='color-tennis-blue'>Vue en grille</span> ( <i class='fa-regular fa-table-list color-tennis-blue'></i> ) est affiché.
      my_scores: Mes scores
      p22_html: Chacune de mes dates de matchs et les points des joueurs avec des liens tels que <span class='color-tennis-blue'>Vers ma box</span>, <span class='color-tennis-blue'>Carte du match</span> et <span class='color-tennis-blue'>Entrer le score</span>.
      p23_html: Lien vers la <span class='color-tennis-blue'>messagerie de box</span> pour organiser vos prochains matchs.
      match_results: Affichage des résultats du match
      p24: "Détails d'un match joué:"
      li05: date du match et numéro du terrain
      li06: score, avec date et heure de saisie
      li07: gains du match et total des points.
      p24b: Le score du gagnant est en vert, celui du perdant en rouge.
      new_match_score: Nouveau score
      p25: Formulaire pour saisir les détails d'un nouveau match.
      match_edit_score: Éditer le score
      p26: Formulaire pour modifier les détails du match ou supprimer le score.
      chatrooms: Messageries
      p27_html: >
        Les messagerie sont accessibles depuis le menu principal pour l'admin et les referee et depuis la page <span class='bold-font color-tennis-red'>Scores & messagerie</span> pour les joueurs.<br>
        La <b>messagerie #general</b> est réservée à l'admin et aux referees quel que soit leur club.
        Sa vocation est la communication à portée générale, et non pour un club spécifique, et pour communiquer avec l'admin.<br>
        Dans les messagerie, une couleur est attribuée aux messages, selon leur auteur:<br>
      p28_html: >
        Chaque box dispose d'une <b>messagerie</b> dédiée, accessible aux joueurs depuis la page <span class='bold-font color-tennis-red'>Scores & messagerie</span>.<br><br>
        Une couleur est attribuée aux messages, selon leur auteur:<br>
      li08_html: <span class='color-tennis-blue'>Les messages des joueurs de votre club apparaissent en bleu</span>
      li09_html: <span class='color-tennis-aqua'>Les messages de votre Referee apparaissent en aqua</span>
      li10_html: <span class= 'color-grey'>Les messages des joueurs d'autres clubs apparaissent en gris clair</span>
      li11_html: <span class= 'color-black'>Les messages de Referee d'autres clubs apparaissent en gris foncé</span>
      li12_html: <span class= 'color-tennis-red'>Les messages de l'admin apparaissent en rouge</span>
      p29: Les messages reçus apparaissent à gauche de l'écran, et les messages envoyés à droite.
